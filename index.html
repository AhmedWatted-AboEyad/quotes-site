<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عبارة اليوم</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Tajawal', sans-serif;
  overflow: hidden;
  background: black;
  color: white;
}

/* الخلفية */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  filter: blur(25px) brightness(0.5);
  transform: scale(1.2);
  transition: 1s;
}

/* طبقة */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2;
}

/* زر البداية */
.start-btn {
  padding: 18px 50px;
  font-size: 18px;
  border-radius: 20px;
  border: none;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.start-btn:hover {
  transform: scale(1.1);
  background: rgba(255,255,255,0.2);
}

/* المحتوى */
.container {
  position: relative;
  z-index: 3;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* الكرت */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 20px;
  width: 320px;
  text-align: center;
  opacity: 0;
  transform: scale(0.9);
  transition: 0.6s;
}

/* الصورة */
.card img {
  width: 100%;
  border-radius: 15px;
}

/* العداد */
#timer {
  margin-bottom: 20px;
  font-size: 14px;
  color: #ccc;
}

/* زر */
button.action {
  margin-top: 15px;
  padding: 10px 25px;
  border-radius: 15px;
  border: none;
  background: white;
  color: black;
  cursor: pointer;
}

/* ظهور */
.show {
  opacity: 1;
  transform: scale(1);
}
</style>

</head>

<body>

<div id="bg"></div>

<div class="overlay" id="overlay">
  <button class="start-btn" onclick="start()">اضغط لتشاهد العبارة</button>
</div>

<div class="container">
  <div id="timer"></div>

  <div class="card" id="card">
    <img id="quoteImage">
    <button class="action" onclick="newQuote()">عبارة جديدة</button>
  </div>
</div>

<script>

// الصور
const images = [
  "images/1.jpg",
  "images/2.jpg",
  "images/3.jpg"
];

// اختيار عشوائي
function getRandom() {
  let last = localStorage.getItem("last");
  let i;

  do {
    i = Math.floor(Math.random() * images.length);
  } while (i == last && images.length > 1);

  localStorage.setItem("last", i);
  return images[i];
}

// بدء
function start() {
  document.getElementById("overlay").style.display = "none";
  showImage();
}

// عرض
function showImage() {
  const img = document.getElementById("quoteImage");
  const bg = document.getElementById("bg");

  let src = getRandom();

  img.src = src;
  bg.style.backgroundImage = `url(${src})`;

  const card = document.getElementById("card");
  setTimeout(() => {
    card.classList.add("show");
  }, 100);
}

// تغيير
function newQuote() {
  showImage();
}

// عداد
function timer() {
  const now = new Date();
  const tomorrow = new Date();
  tomorrow.setHours(24,0,0,0);

  const diff = tomorrow - now;

  const h = Math.floor(diff / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));

  document.getElementById("timer").innerText =
    "⏳ باقي للعبارة القادمة: " + h + " ساعة و " + m + " دقيقة";
}

setInterval(timer, 1000);
timer();

</script>

</body>
</html>
