<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عبارة اليوم</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Tajawal', sans-serif;
  overflow: hidden;
  background: black;
  color: white;
}

/* الخلفية */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  filter: blur(25px) brightness(0.5);
  transform: scale(1.2);
  transition: 1s;
}

/* طبقة */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2;
}

/* زر البداية */
.start-btn {
  padding: 18px 50px;
  font-size: 18px;
  border-radius: 20px;
  border: none;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.start-btn:hover {
  transform: scale(1.1);
  background: rgba(255,255,255,0.2);
}

/* المحتوى */
.container {
  position: relative;
  z-index: 3;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* الكرت */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 20px;
  width: 320px;
  text-align: center;
  opacity: 0;
  transform: scale(0.9);
  transition: 0.6s;
}

/* الصورة */
.card img {
  width: 100%;
  border-radius: 15px;
}

/* العداد */
#timer {
  margin-bottom: 20px;
  font-size: 15px;
  color: #fff;
  background: rgba(0, 0, 0, 0.4);
  padding: 10px 20px;
  border-radius: 15px;
  backdrop-filter: blur(5px);
}

/* ظهور */
.show {
  opacity: 1;
  transform: scale(1);
}
</style>

</head>

<body>

<div id="bg"></div>

<div class="overlay" id="overlay">
  <button class="start-btn" onclick="start()">اضغط لتشاهد عبارة اليوم</button>
</div>

<div class="container">
  <div id="timer"></div>

  <div class="card" id="card">
    <img id="quoteImage">
  </div>
</div>

<script>

// الصور (تأكد من وجود مجلد images وبداخله الصور)
const images = [
  "images/1.jpg",
  "images/2.jpg",
  "images/3.jpg"
];

// دالة لجلب عبارة اليوم فقط وعدم تغييرها حتى الغد
function getDailyQuote() {
  const today = new Date().toLocaleDateString(); // تاريخ اليوم
  const savedDate = localStorage.getItem("savedDate");
  let savedIndex = localStorage.getItem("savedIndex");

  // إذا كان المستخدم يدخل لأول مرة، أو دخل في يوم جديد
  if (savedDate !== today || savedIndex === null) {
    let newIndex;
    // اختيار صورة عشوائية تختلف عن صورة الأمس
    do {
      newIndex = Math.floor(Math.random() * images.length);
    } while (newIndex == savedIndex && images.length > 1);

    // حفظ التاريخ ورقم الصورة الجديدة
    localStorage.setItem("savedDate", today);
    localStorage.setItem("savedIndex", newIndex);
    return images[newIndex];
  }

  // إذا دخل المستخدم في نفس اليوم، نعرض له نفس الصورة
  return images[savedIndex];
}

// بدء
function start() {
  document.getElementById("overlay").style.display = "none";
  showImage();
}

// عرض
function showImage() {
  const img = document.getElementById("quoteImage");
  const bg = document.getElementById("bg");

  let src = getDailyQuote();

  img.src = src;
  bg.style.backgroundImage = `url(${src})`;

  const card = document.getElementById("card");
  setTimeout(() => {
    card.classList.add("show");
  }, 100);
}

// عداد
function timer() {
  const now = new Date();
  const tomorrow = new Date();
  tomorrow.setHours(24,0,0,0); // منتصف الليل القادم

  const diff = tomorrow - now;

  const h = Math.floor(diff / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));
  const s = Math.floor((diff % (1000*60)) / 1000); // إضافة الثواني

  document.getElementById("timer").innerText =
    "⏳ باقي للعبارة القادمة: " + h + " ساعة و " + m + " دقيقة و " + s + " ثانية";
}

// تحديث العداد كل ثانية
setInterval(timer, 1000);
timer();

</script>

</body>
</html>
