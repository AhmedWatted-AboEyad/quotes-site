<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عبارة اليوم</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Tajawal', sans-serif;
  overflow: hidden;
  background: black;
  color: white;
}

/* الخلفية */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  filter: blur(25px) brightness(0.5);
  transform: scale(1.2);
  transition: 1s;
}

/* طبقة البداية */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10; /* أولوية عالية جداً للزر */
}

/* زر البداية */
.start-btn {
  padding: 18px 50px;
  font-size: 18px;
  font-family: 'Tajawal', sans-serif;
  border-radius: 20px;
  border: none;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.start-btn:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.25);
}

/* المحتوى الرئيسي مخفي بالبداية */
.container {
  position: relative;
  z-index: 5;
  height: 100vh;
  display: none; /* إخفاء لتجنب التداخل */
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* الكرت */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 20px;
  width: 90%;
  max-width: 350px;
  text-align: center;
  opacity: 0;
  transform: scale(0.9);
  transition: 0.6s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* الصورة - تم التعديل لتكون ملائمة */
.card img {
  width: 100%;
  max-height: 55vh; /* تحديد أقصى ارتفاع لضمان ظهورها كاملة */
  object-fit: contain; /* احتواء الصورة بالكامل دون قص */
  border-radius: 15px;
  margin-bottom: 15px;
}

/* العداد */
#timer {
  margin-bottom: 20px;
  font-size: 16px;
  font-weight: 500;
  color: #fff;
  background: rgba(0, 0, 0, 0.5);
  padding: 12px 25px;
  border-radius: 20px;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1);
}

/* أزرار التفاعل (لايك وتحميل) */
.actions {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.action-btn {
  flex: 1;
  padding: 12px;
  border-radius: 15px;
  border: none;
  font-family: 'Tajawal', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

.download-btn {
  background: rgba(255, 255, 255, 0.9);
  color: black;
}

.download-btn:hover {
  background: white;
}

.like-btn {
  background: rgba(255, 255, 255, 0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
}

.like-btn.liked {
  background: rgba(255, 59, 48, 0.2);
  color: #ff3b30;
  border-color: rgba(255, 59, 48, 0.5);
}

/* تأثير الظهور */
.show {
  opacity: 1;
  transform: scale(1);
}
</style>

</head>

<body>

<div id="bg"></div>

<div class="overlay" id="overlay">
  <button class="start-btn" onclick="start()">اضغط لتشاهد عبارة اليوم</button>
</div>

<div class="container" id="mainContainer">
  <div id="timer"></div>

  <div class="card" id="card">
    <img id="quoteImage" src="">
    
    <div class="actions">
      <button class="action-btn like-btn" id="likeBtn" onclick="toggleLike()">
        <span id="likeIcon">🤍</span> إعجاب
      </button>
      <button class="action-btn download-btn" onclick="downloadImage()">
        ⬇️ حفظ 
      </button>
    </div>
  </div>
</div>

<script>

// الصور 
const images = [
  "images/1.jpg",
  "images/2.jpg",
  "images/3.jpg"
];

// جلب عبارة اليوم
function getDailyQuote() {
  const today = new Date().toLocaleDateString(); 
  const savedDate = localStorage.getItem("savedDate");
  let savedIndex = localStorage.getItem("savedIndex");

  if (savedDate !== today || savedIndex === null) {
    let newIndex;
    do {
      newIndex = Math.floor(Math.random() * images.length);
    } while (newIndex == savedIndex && images.length > 1);

    localStorage.setItem("savedDate", today);
    localStorage.setItem("savedIndex", newIndex);
    return images[newIndex];
  }
  return images[savedIndex];
}

// بدء
function start() {
  // إخفاء طبقة البداية وإظهار الحاوية
  document.getElementById("overlay").style.display = "none";
  document.getElementById("mainContainer").style.display = "flex";
  
  showImage();
  updateLikeButton(); // تحديث حالة الإعجاب عند الفتح
}

// عرض
function showImage() {
  const img = document.getElementById("quoteImage");
  const bg = document.getElementById("bg");

  let src = getDailyQuote();

  img.src = src;
  bg.style.backgroundImage = `url(${src})`;

  const card = document.getElementById("card");
  setTimeout(() => {
    card.classList.add("show");
  }, 100);
}

// تنزيل الصورة
function downloadImage() {
  const imgSrc = document.getElementById("quoteImage").src;
  const link = document.createElement('a');
  link.href = imgSrc;
  link.download = 'عبارة_اليوم.jpg'; // اسم الملف عند التحميل
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

// نظام الإعجاب
function toggleLike() {
  let savedIndex = localStorage.getItem("savedIndex");
  let likedImages = JSON.parse(localStorage.getItem("likedImages")) || {};
  const likeBtn = document.getElementById("likeBtn");
  const likeIcon = document.getElementById("likeIcon");

  if (likedImages[savedIndex]) {
    // إلغاء الإعجاب
    delete likedImages[savedIndex];
    likeBtn.classList.remove("liked");
    likeIcon.innerText = "🤍";
  } else {
    // إضافة إعجاب
    likedImages[savedIndex] = true;
    likeBtn.classList.add("liked");
    likeIcon.innerText = "❤️";
  }
  
  localStorage.setItem("likedImages", JSON.stringify(likedImages));
}

// التحقق من حالة الإعجاب عند تحميل الصورة
function updateLikeButton() {
  let savedIndex = localStorage.getItem("savedIndex");
  let likedImages = JSON.parse(localStorage.getItem("likedImages")) || {};
  const likeBtn = document.getElementById("likeBtn");
  const likeIcon = document.getElementById("likeIcon");

  if (likedImages[savedIndex]) {
    likeBtn.classList.add("liked");
    likeIcon.innerText = "❤️";
  } else {
    likeBtn.classList.remove("liked");
    likeIcon.innerText = "🤍";
  }
}

// عداد
function timer() {
  const now = new Date();
  const tomorrow = new Date();
  tomorrow.setHours(24,0,0,0); 

  const diff = tomorrow - now;

  const h = Math.floor(diff / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));
  const s = Math.floor((diff % (1000*60)) / 1000); 

  document.getElementById("timer").innerText =
    "⏳ باقي للعبارة القادمة: " + h + " ساعة و " + m + " دقيقة و " + s + " ثانية";
}

setInterval(timer, 1000);
timer();

</script>

</body>
</html>
