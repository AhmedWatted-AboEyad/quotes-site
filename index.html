<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>عبارة اليوم</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f1ea;
      text-align: center;
    }

    .container {
      padding: 40px;
    }

    img {
      max-width: 90%;
      border-radius: 15px;
      margin-top: 30px;
    }

    textarea {
      width: 80%;
      height: 100px;
      margin-top: 40px;
      border-radius: 10px;
      border: none;
      padding: 15px;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 10px 25px;
      border: none;
      background: black;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>✨ عبارة اليوم</h2>

  <img id="quoteImage" src="images/1.jpg">

  <h3>شارك عبارتك</h3>

  <form id="form">
    <textarea name="message" placeholder="اكتب عبارتك هنا"></textarea><br>
    <button type="submit">إرسال</button>
  </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
  emailjs.init("Z9NEFzkoGugN_ewC8");

  document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    emailjs.send("service_92yc47f", "template_mvy98sn", {
      message: this.message.value
    }).then(() => {
      alert("تم إرسال عبارتك ✅");
    });
  });
</script>

</body>
</html>
