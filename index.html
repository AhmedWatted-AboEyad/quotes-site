<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>عبارة اليوم</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f3f1ea;
  text-align: center;
}

img {
  max-width: 90%;
  margin-top: 80px;
  border-radius: 15px;
  display: none;
}

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
}

.start-btn {
  padding: 15px 30px;
  font-size: 18px;
  background: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

#timer {
  margin-top: 20px;
  font-size: 18px;
}
</style>

</head>

<body>

<h2>✨ عبارة اليوم</h2>
<div id="timer"></div>

<img id="quoteImage">

<div class="overlay" id="overlay">
  <button class="start-btn" onclick="showQuote()">اضغط لتشاهد العبارة</button>
</div>

<script>

// 📁 حط أسماء الصور هون
const images = [
  "images/1.jpg",
  "images/2.jpg",
  "images/3.jpg"
];

// اختيار عشوائي بدون تكرار مباشر
function getRandomImage() {
  let lastIndex = localStorage.getItem("lastIndex");
  let index;

  do {
    index = Math.floor(Math.random() * images.length);
  } while (index == lastIndex && images.length > 1);

  localStorage.setItem("lastIndex", index);
  return images[index];
}

// عرض الصورة
function showQuote() {
  const img = document.getElementById("quoteImage");

  img.src = getRandomImage();

  document.getElementById("overlay").style.display = "none";
  img.style.display = "block";
}

// عداد 24 ساعة
function updateTimer() {
  const now = new Date();
  const tomorrow = new Date();

  tomorrow.setHours(24,0,0,0);

  const diff = tomorrow - now;

  const hours = Math.floor(diff / (1000*60*60));
  const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));

  document.getElementById("timer").innerText =
    "⏳ باقي للعبارة القادمة: " + hours + " ساعة و " + minutes + " دقيقة";
}

setInterval(updateTimer, 1000);
updateTimer();

</script>

</body>
</html>
