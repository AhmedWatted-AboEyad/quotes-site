<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>رسالة اليوم</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="images/icon.png">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri:wght@400;700&family=Cairo:wght@400;700&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body { margin: 0; font-family: 'Tajawal', sans-serif; overflow-x: hidden; background: black; color: white; min-height: 100dvh; display: flex; flex-direction: column; }
#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(25px) brightness(0.4); transform: scale(1.2); transition: 1s; z-index: -1; }

/* شريط التنقل العلوي (Header) */
.header {
  display: flex; justify-content: center; gap: 15px; padding: 20px 10px; z-index: 10;
  background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); position: sticky; top: 0;
}
.nav-btn {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: white; padding: 10px 20px; border-radius: 20px; font-family: 'Tajawal', sans-serif;
  font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px);
}
.nav-btn.active { background: rgba(255,255,255,0.9); color: black; box-shadow: 0 4px 15px rgba(255,255,255,0.3); }

/* حاويات الأقسام */
.tab-content { display: none; flex-direction: column; align-items: center; padding: 10px 10px 40px 10px; flex: 1; z-index: 5; }
.tab-content.active-tab { display: flex; }

/* قسم رسالة اليوم */
#timer { margin-bottom: 15px; font-size: 15px; font-weight: bold; color: #ffd700; background: rgba(0, 0, 0, 0.6); padding: 10px 20px; border-radius: 20px; backdrop-filter: blur(8px); text-align: center; display: none; border: 1px solid #ffd700; }
.card { background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); border-radius: 25px; padding: 15px; width: 95%; max-width: 420px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
/* تكبير الصورة بناءً على طلبك */
.card img { width: 100%; max-height: 65vh; object-fit: contain; border-radius: 15px; margin-bottom: 15px; transition: opacity 0.5s ease; }

.actions-container { display: flex; flex-direction: column; gap: 12px; }
.actions-row { display: flex; justify-content: space-between; gap: 10px; }
.action-btn { flex: 1; padding: 12px; border-radius: 15px; border: none; font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 6px; }
.next-btn { background: linear-gradient(45deg, #007bff, #00d4ff); color: white; width: 100%; border: none; }
.download-btn { background: rgba(255, 255, 255, 0.9); color: black; }
.like-btn { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
.like-btn.liked { background: rgba(255, 59, 48, 0.2); color: #ff3b30; border-color: rgba(255, 59, 48, 0.5); }

/* قسم سوي رسالتك */
.creator-card { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; width: 95%; max-width: 420px; border: 1px solid rgba(255,255,255,0.2); }
.canvas-container { position: relative; width: 100%; border-radius: 15px; overflow: hidden; touch-action: none; background: #fff; }
.canvas-container img { width: 100%; display: block; user-select: none; pointer-events: none; }
.draggable-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #000; font-size: 24px; font-weight: bold; font-family: 'Tajawal', sans-serif; cursor: move; text-align: center; white-space: pre-wrap; text-shadow: 0px 0px 5px rgba(255,255,255,0.5); padding: 10px; user-select: none; }
.controls { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
.custom-input, .custom-select { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 12px; padding: 12px; font-family: inherit; box-sizing: border-box; outline: none; }
.custom-select option { background: #333; color: white; }

/* الإشعارات */
#toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
.toast { background: rgba(255,255,255,0.95); color: black; padding: 12px 25px; border-radius: 20px; font-family: 'Tajawal', sans-serif; font-weight: bold; font-size: 14px; box-shadow: 0 5px 20px rgba(0,0,0,0.4); opacity: 0; transform: translateY(20px); transition: all 0.4s ease; text-align: center; }
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div id="bg"></div>

<div class="header">
  <button class="nav-btn" id="navCreate" onclick="switchTab('createTab', 'navCreate')">سوي رسالتك ✍️</button>
  <button class="nav-btn active" id="navToday" onclick="switchTab('todayTab', 'navToday')">رسالة اليوم 💌</button>
</div>

<div id="todayTab" class="tab-content active-tab">
  <div id="timer"></div>
  <div class="card" id="card">
    <img id="quoteImage" src="" onload="this.style.opacity='1'">
    <div class="actions-container">
      <button class="action-btn next-btn" id="nextBtn" onclick="loadNextQuote()">
        🔀 رسالة أخرى (<span id="remViews">2</span> متبقية)
      </button>
      <div class="actions-row">
        <button class="action-btn like-btn" id="likeBtn" onclick="toggleLike()">
          <span id="likeIcon">🤍</span> إعجاب 
        </button>
        <button class="action-btn download-btn" onclick="downloadImage('quoteImage')">
          ⬇️ حفظ 
        </button>
      </div>
    </div>
  </div>
</div>

<div id="createTab" class="tab-content">
  <div class="creator-card">
    <h3 style="margin-top: 0; text-align: center;">صمم رسالتك بنفسك ✨</h3>
    <p style="font-size: 12px; text-align: center; color: #ccc;">اكتب النص واسحبه بإصبعك للمكان المناسب</p>
    
    <div class="canvas-container" id="captureArea">
      <img src="images/template.jpg" id="templateBg" alt="خلفية">
      <div class="draggable-text" id="dragText">اكتب رسالتك هنا...</div>
    </div>

    <div class="controls">
      <textarea id="customText" class="custom-input" rows="3" placeholder="اكتب رسالتك..." oninput="updateText()"></textarea>
      
      <div class="actions-row">
        <select id="fontSelect" class="custom-select" onchange="changeFont()">
          <option value="Tajawal">خط تجوال (عصري)</option>
          <option value="Amiri">خط أميري (كلاسيكي)</option>
          <option value="Cairo">خط كايرو (عريض)</option>
          <option value="Reem Kufi">خط كوفي (فني)</option>
        </select>
        <select id="colorSelect" class="custom-select" onchange="changeColor()">
          <option value="#000000">لون أسود</option>
          <option value="#FFFFFF">لون أبيض</option>
          <option value="#8B4513">لون بني</option>
          <option value="#2F4F4F">لون رمادي غامق</option>
        </select>
      </div>
      
      <button class="action-btn download-btn" style="width: 100%; margin-top: 10px;" onclick="exportCustomImage()">
        ⬇️ حفظ التصميم
      </button>
    </div>
  </div>
</div>

<script>
// --- إعدادات قسم (رسالة اليوم) العشوائية ---
const images = ["images/1.jpg", "images/2.jpg", "images/3.jpg", "images/4.jpg", "images/5.jpg"]; // ضف كل صورك هنا
const MAX_VIEWS = 3;

function showToast(message) {
  let container = document.getElementById("toast-container");
  if (!container) { container = document.createElement("div"); container.id = "toast-container"; document.body.appendChild(container); }
  const toast = document.createElement("div"); toast.className = "toast"; toast.innerText = message; container.appendChild(toast);
  setTimeout(() => toast.classList.add("show"), 10);
  setTimeout(() => { toast.classList.remove("show"); setTimeout(() => toast.remove(), 400); }, 3000);
}

// دالة لجلب صورة عشوائية تختلف عن الصورة المعروضة حالياً
function getRandomImage(currentIndex) {
  let newIndex;
  do {
    newIndex = Math.floor(Math.random() * images.length);
  } while (newIndex == currentIndex && images.length > 1);
  return newIndex;
}

function initDailyLimits() {
  const today = new Date().toLocaleDateString();
  let savedDate = localStorage.getItem("savedDate");
  
  if (savedDate !== today) {
    // يوم جديد: إعادة تصفير العداد
    localStorage.setItem("savedDate", today);
    localStorage.setItem("viewCount", 1);
    let initialIndex = getRandomImage(-1);
    localStorage.setItem("currentQuoteIndex", initialIndex);
  }
  
  updateQuoteUI();
}

function loadNextQuote() {
  let count = parseInt(localStorage.getItem("viewCount"));
  if (count < MAX_VIEWS) {
    count++;
    localStorage.setItem("viewCount", count);
    
    let currentIndex = localStorage.getItem("currentQuoteIndex");
    let nextIndex = getRandomImage(currentIndex);
    localStorage.setItem("currentQuoteIndex", nextIndex);
    
    document.getElementById("quoteImage").style.opacity = "0";
    setTimeout(updateQuoteUI, 300); // تأخير بسيط لتأثير النعومة
  }
}

function updateQuoteUI() {
  let count = parseInt(localStorage.getItem("viewCount"));
  let index = localStorage.getItem("currentQuoteIndex");
  let src = images[index];
  
  const img = document.getElementById("quoteImage");
  const bg = document.getElementById("bg");
  
  img.src = src;
  bg.style.backgroundImage = `url(${src})`;
  
  // تحديث الإعجابات
  updateLikeDisplay();

  const nextBtn = document.getElementById("nextBtn");
  const timerDiv = document.getElementById("timer");
  const remViewsSpan = document.getElementById("remViews");
  
  if (count >= MAX_VIEWS) {
    nextBtn.style.display = "none";
    timerDiv.style.display = "block";
    startTimer();
  } else {
    nextBtn.style.display = "block";
    timerDiv.style.display = "none";
    remViewsSpan.innerText = MAX_VIEWS - count;
  }
}

function startTimer() {
  function update() {
    const now = new Date(); const tomorrow = new Date(); tomorrow.setHours(24,0,0,0);
    const diff = tomorrow - now;
    const h = Math.floor(diff / (1000*60*60)); const m = Math.floor((diff % (1000*60*60)) / (1000*60)); const s = Math.floor((diff % (1000*60)) / 1000);
    document.getElementById("timer").innerText = "⏳ انتهت رسائلك! رسائل جديدة بعد: " + h + "س " + m + "د " + s + "ث";
  }
  setInterval(update, 1000); update();
}

function downloadImage(imgId) { 
  const imgSrc = document.getElementById(imgId).src; 
  const link = document.createElement('a'); 
  link.href = imgSrc; 
  link.download = 'رسالتك.jpg'; 
  document.body.appendChild(link); link.click(); document.body.removeChild(link); 
  showToast("تم التحميل بنجاح 📥"); 
}

function toggleLike() { 
  let index = localStorage.getItem("currentQuoteIndex"); 
  let likedImages = JSON.parse(localStorage.getItem("likedImages")) || {}; 
  const likeBtn = document.getElementById("likeBtn");
  const likeIcon = document.getElementById("likeIcon");
  
  if (likedImages[index]) { 
    delete likedImages[index]; 
  } else { 
    likedImages[index] = true; showToast("تم الإعجاب بالرسالة ❤️"); 
  } 
  localStorage.setItem("likedImages", JSON.stringify(likedImages)); 
  updateLikeDisplay(); 
}

function updateLikeDisplay() { 
  let index = localStorage.getItem("currentQuoteIndex"); 
  let likedImages = JSON.parse(localStorage.getItem("likedImages")) || {}; 
  const likeBtn = document.getElementById("likeBtn"); 
  const likeIcon = document.getElementById("likeIcon"); 
  if (likedImages[index]) { likeBtn.classList.add("liked"); likeIcon.innerText = "❤️"; } 
  else { likeBtn.classList.remove("liked"); likeIcon.innerText = "🤍"; } 
}

// --- نظام التنقل بين الأقسام (Tabs) ---
function switchTab(tabId, btnId) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  
  document.getElementById(tabId).classList.add('active-tab');
  document.getElementById(btnId).classList.add('active');
}

// --- إعدادات قسم (سوي رسالتك) المتقدمة ---
function updateText() {
  const text = document.getElementById('customText').value;
  document.getElementById('dragText').innerText = text || "اكتب رسالتك هنا...";
}

function changeFont() {
  document.getElementById('dragText').style.fontFamily = document.getElementById('fontSelect').value;
}

function changeColor() {
  document.getElementById('dragText').style.color = document.getElementById('colorSelect').value;
}

// برمجة السحب والإفلات (Drag and Drop) تدعم اللمس والماوس
const dragItem = document.getElementById("dragText");
const container = document.getElementById("captureArea");
let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

container.addEventListener("touchstart", dragStart, {passive: false});
container.addEventListener("touchend", dragEnd, false);
container.addEventListener("touchmove", drag, {passive: false});
container.addEventListener("mousedown", dragStart, false);
container.addEventListener("mouseup", dragEnd, false);
container.addEventListener("mousemove", drag, false);
container.addEventListener("mouseleave", dragEnd, false);

function dragStart(e) {
  if (e.target === dragItem) {
    active = true;
    initialX = (e.type === "touchstart" ? e.touches[0].clientX : e.clientX) - xOffset;
    initialY = (e.type === "touchstart" ? e.touches[0].clientY : e.clientY) - yOffset;
  }
}
function dragEnd(e) { active = false; }
function drag(e) {
  if (active) {
    e.preventDefault();
    currentX = (e.type === "touchmove" ? e.touches[0].clientX : e.clientX) - initialX;
    currentY = (e.type === "touchmove" ? e.touches[0].clientY : e.clientY) - initialY;
    xOffset = currentX; yOffset = currentY;
    
    // منع النص من الخروج خارج الصورة
    const rect = container.getBoundingClientRect();
    const textRect = dragItem.getBoundingClientRect();
    
    dragItem.style.transform = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px))`;
  }
}

// تصدير التصميم كصورة باستخدام html2canvas
function exportCustomImage() {
  const captureArea = document.getElementById('captureArea');
  const btn = document.querySelector('.creator-card .download-btn');
  const originalText = btn.innerHTML;
  
  btn.innerHTML = "جاري التجهيز ⏳...";
  btn.disabled = true;

  html2canvas(captureArea, { scale: 3, useCORS: true }).then(canvas => {
    const link = document.createElement('a');
    link.download = 'رسالتي_الخاصة.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.9);
    link.click();
    showToast("تم حفظ تصميمك بنجاح! 🎉");
    btn.innerHTML = originalText;
    btn.disabled = false;
  });
}

// تشغيل الإعدادات عند فتح الصفحة
window.onload = () => {
  initDailyLimits();
};
</script>
</body>
</html>
