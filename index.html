<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>رسالة اليوم</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="images/icon.png">

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&family=Amiri:wght@400;700&family=Cairo:wght@400;700&family=Reem+Kufi:wght@400;700&family=Almarai:wght@400;700&family=Lalezar&family=Changa:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
/* التنسيقات الأساسية */
body { margin: 0; font-family: 'Tajawal', sans-serif; overflow-x: hidden; overflow-y: auto; background: black; color: white; min-height: 100dvh; }
#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(25px) brightness(0.5); transform: scale(1.2); transition: background-image 1s ease-in-out; z-index: -1; }

/* شاشة البداية */
.overlay { position: fixed; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; gap: 20px; }
.start-icon { width: 100px; height: 100px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: opacity 0.5s ease; }
.start-btn { padding: 18px 40px; font-size: 18px; font-family: 'Tajawal', sans-serif; border-radius: 20px; border: none; backdrop-filter: blur(10px); background: rgba(255,255,255,0.15); color: white; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
#splashScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; justify-content: center; align-items: center; z-index: 55; opacity: 0; transition: opacity 0.5s ease; }
#splashScreen img { width: 150px; height: 150px; border-radius: 30px; animation: pulseIcon 1.5s infinite; }
@keyframes pulseIcon { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

/* الحاوية الرئيسية وشريط التنقل */
#mainApp { display: none; flex-direction: column; min-height: 100dvh; position: relative; z-index: 5; }
.header-container { display: flex; flex-direction: column; align-items: center; padding: 10px 0; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); position: sticky; top: 0; z-index: 10; gap: 10px; width: 100%; }
.streak-badge { background: rgba(255, 150, 0, 0.2); border: 1px solid rgba(255, 150, 0, 0.5); color: #ffd700; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
.header { display: flex; justify-content: center; gap: 8px; flex-wrap: nowrap; overflow-x: auto; width: 100%; padding: 5px 10px; box-sizing: border-box; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.header::-webkit-scrollbar { display: none; }
.nav-btn { white-space: nowrap; flex-shrink: 0; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 15px; border-radius: 20px; font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.3s; backdrop-filter: blur(10px); }
.nav-btn.active { background: rgba(255,255,255,0.9); color: black; box-shadow: 0 4px 15px rgba(255,255,255,0.3); }

/* الأقسام */
.tab-content { display: none; flex-direction: column; align-items: center; padding: 10px 10px 40px 10px; flex: 1; width: 100%; box-sizing: border-box; }
.tab-content.active-tab { display: flex; }

/* قسم رسالة اليوم */
#timer { margin-bottom: 15px; font-size: 15px; font-weight: bold; color: #ffd700; background: rgba(0, 0, 0, 0.6); padding: 10px 20px; border-radius: 20px; backdrop-filter: blur(8px); text-align: center; display: none; border: 1px solid rgba(255, 215, 0, 0.5); }
.card { background: rgba(255,255,255,0.08); backdrop-filter: blur(15px); border-radius: 25px; padding: 15px; width: 100%; max-width: 400px; text-align: center; opacity: 1; transition: 0.6s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
.card img { width: 100%; max-height: 60vh; object-fit: contain; border-radius: 15px; margin-bottom: 15px; opacity: 0; transition: opacity 0.5s ease; }
.actions-container { display: flex; flex-direction: column; gap: 12px; }
.actions-row { display: flex; justify-content: space-between; gap: 8px; width: 100%; }
.action-btn { flex: 1; padding: 12px 5px; border-radius: 15px; border: none; font-family: 'Tajawal', sans-serif; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 5px; white-space: nowrap; }
.next-btn { background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%); color: white; width: 100%; }
.download-btn { background: rgba(255, 255, 255, 0.9); color: black; }
.share-btn { background: rgba(76, 175, 80, 0.2); color: #4CAF50; border: 1px solid rgba(76, 175, 80, 0.5); }
.like-btn { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
.like-btn.liked { background: rgba(255, 59, 48, 0.2); color: #ff3b30; border-color: rgba(255, 59, 48, 0.5); }
.suggest-btn { background: rgba(255, 255, 255, 0.05); color: white; border: 1px dashed rgba(255,255,255,0.4); width: 100%; }

/* معرض المفضلات */
.favorites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; width: 100%; max-width: 500px; }
.fav-item { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.1); transition: 0.3s; cursor: pointer; }
.empty-state { text-align: center; color: #ccc; margin-top: 50px; font-size: 16px; grid-column: 1 / -1; }

/* قسم سوي رسالتك المطور */
.creator-card { background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); padding: 15px; border-radius: 25px; width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
.canvas-container { position: relative; width: 100%; border-radius: 15px; overflow: hidden; touch-action: none; background: #000; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; transition: aspect-ratio 0.3s ease; aspect-ratio: 9/16; } /* الافتراضي مقاس الهاتف */

/* رجعنا cover عشان تتعبى الشاشة بالكامل بدون فراغات سوداء */
.canvas-container > img#templateBg { width: 100%; height: 100%; object-fit: cover; display: block; user-select: none; pointer-events: none; position: absolute; top: 0; left: 0; z-index: 0; }

/* العناصر القابلة للسحب (نصوص وصور) */
.draggable-item { position: absolute; transform-origin: center center; cursor: move; user-select: none; z-index: 1; pointer-events: auto; }
.draggable-item.selected { border: 2px dashed #ffd700; background: rgba(255,255,255,0.2); border-radius: 5px; }
.draggable-text { color: #fff; font-size: 24px; font-weight: bold; font-family: 'Tajawal', sans-serif; text-align: center; white-space: pre-wrap; padding: 5px; text-shadow: 0px 0px 5px rgba(0,0,0,0.8); }
.draggable-img { max-width: 150px; display: block; }

/* أدوات التحكم الديناميكية */
.buttons-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap;}
.add-btn { flex: 1; background: rgba(255, 215, 0, 0.2); color: #ffd700; border: 1px dashed rgba(255, 215, 0, 0.5); padding: 10px; border-radius: 10px; font-family: 'Tajawal'; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center;}
.tools-panel { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 10px; }
.custom-input, .custom-select { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 10px; padding: 10px; font-family: inherit; box-sizing: border-box; outline: none; text-align: right;}
.custom-select option { background: #333; color: white; }
.slider-container { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 8px 10px; border-radius: 10px; }
.slider-container span { font-size: 12px; white-space: nowrap; color: #ccc; min-width: 40px;}
input[type=range] { flex: 1; accent-color: #ffd700; }
.delete-btn { background: rgba(255, 59, 48, 0.2); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.5); padding: 10px; border-radius: 10px; font-family: 'Tajawal'; font-weight: bold; cursor: pointer; width: 100%; }

/* النوافذ والإشعارات */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(8px); }
.modal-content { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 25px; padding: 20px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); transform: scale(0.8); opacity: 0; transition: 0.4s; position: relative; box-sizing: border-box; }
.modal-content.show-modal { transform: scale(1); opacity: 1; }
.close-modal { position: absolute; top: -10px; right: -10px; background: #ff3b30; border: 2px solid white; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 10; }
.submit-btn { background: white; color: black; border: none; padding: 12px 20px; border-radius: 15px; font-family: 'Tajawal', sans-serif; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 10px;}
#toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 300px;}
.toast { background: rgba(255,255,255,0.95); color: black; padding: 12px 20px; border-radius: 20px; font-family: 'Tajawal', sans-serif; font-weight: bold; font-size: 14px; box-shadow: 0 5px 20px rgba(0,0,0,0.4); opacity: 0; transform: translateY(20px); transition: all 0.4s ease; text-align: center; }
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div id="bg"></div>

<div id="splashScreen">
  <img src="images/icon.png" alt="رسالة">
</div>

<div class="overlay" id="overlay">
  <img src="images/icon.png" alt="رسالة" class="start-icon">
  <button class="start-btn" onclick="showSplashScreen()">اضغط لتشاهد رسالة اليوم</button>
</div>

<div id="mainApp">
  <div class="header-container">
    <div class="streak-badge" id="streakBadge" style="display: none;">
      🔥 <span id="streakCount">0</span> أيام متتالية
    </div>
    <div class="header">
      <button class="nav-btn" id="navCreate" onclick="switchTab('createTab', 'navCreate')">سوي رسالتك ✍️</button>
      <button class="nav-btn active" id="navToday" onclick="switchTab('todayTab', 'navToday')">رسالة اليوم 💌</button>
      <button class="nav-btn" id="navFav" onclick="switchTab('favTab', 'navFav')">مفضلتي ❤️</button>
    </div>
  </div>

  <div id="todayTab" class="tab-content active-tab">
    <div id="timer"></div>
    <div class="card" id="card">
      <img id="quoteImage" src="" onload="this.style.opacity='1'">
      <div class="actions-container">
        <button class="action-btn next-btn" id="nextBtn" onclick="loadNextQuote()">
          🔀 رسالة أخرى (<span id="remViews">2</span> متبقية)
        </button>
        <div class="actions-row">
          <button class="action-btn like-btn" id="likeBtn" onclick="toggleLike()">
            <span id="likeIcon">🤍</span> إعجاب 
          </button>
          <button class="action-btn share-btn" onclick="shareImage('quoteImage')">
            📤 مشاركة 
          </button>
          <button class="action-btn download-btn" onclick="downloadImage('quoteImage')">
            ⬇️ حفظ 
          </button>
        </div>
        <button class="action-btn suggest-btn" onclick="showModal('suggestModal', 'suggestContent')">
          ✍️ اقترح رسالة للموقع
        </button>
      </div>
    </div>
  </div>

  <div id="favTab" class="tab-content">
    <h3 style="color: #ffd700; margin-top: 0; text-align: center;">رسائلك المفضلة ❤️</h3>
    <p style="font-size: 12px; text-align: center; color: #ccc; margin-bottom: 15px;">اضغط على أي صورة للتفاعل معها</p>
    <div class="favorites-grid" id="favoritesGrid"></div>
  </div>

  <div id="createTab" class="tab-content">
    <div class="creator-card">
      <h3 style="margin-top: 0; text-align: center;">صمم رسالتك بنفسك ✨</h3>
      
      <select id="canvasSizeSelector" class="custom-select" style="margin-bottom: 15px;" onchange="changeCanvasSize()">
        <option value="9/16" selected>📱 هاتف (ستوري/آيفون/جالاكسي)</option>
        <option value="1/1">⬜ مربع (بوست انستغرام)</option>
        <option value="4/5">📄 عمودي (فيسبوك/انستغرام)</option>
        <option value="16/9">💻 كمبيوتر (عرضي/يوتيوب)</option>
      </select>

      <p style="font-size: 12px; text-align: center; color: #ccc; margin-bottom: 15px;">بإمكانك التكبير بإصبعين ✌️ وسحب العنصر لمكانه</p>
      
      <div class="canvas-container" id="captureArea">
        <img src="images/template.jpg" id="templateBg" alt="خلفية">
      </div>

      <div class="buttons-row">
        <label class="add-btn">
          🖼️ الخلفية
          <input type="file" style="display:none" accept="image/*" onchange="changeBackground(event)">
        </label>
        <button class="add-btn" onclick="addNewText()">✍️ إضافة نص</button>
        <label class="add-btn">
          ➕ إضافة صورة
          <input type="file" style="display:none" accept="image/*" onchange="addOverlayImage(event)">
        </label>
      </div>

      <div class="tools-panel" id="toolsPanel" style="display: none;">
        <div id="textToolsRow" style="display: flex; flex-direction: column; gap: 10px;">
          <textarea id="activeTextInput" class="custom-input" placeholder="اكتب رسالتك..." oninput="updateActiveElementText()" rows="2"></textarea>
          <div class="actions-row">
            <select id="activeFont" class="custom-select" onchange="updateActiveElementText()">
              <option value="Tajawal">تجوال</option>
              <option value="Amiri">أميري</option>
              <option value="Cairo">كايرو</option>
              <option value="Reem Kufi">كوفي</option>
              <option value="Almarai">المراعي</option>
              <option value="Lalezar">لاله زار</option>
              <option value="Changa">تشانجا</option>
            </select>
            <select id="activeColor" class="custom-select" onchange="updateActiveElementText()">
              <option value="#FFFFFF">أبيض</option>
              <option value="#000000">أسود</option>
              <option value="#FFD700">ذهبي</option>
              <option value="#8B4513">بني</option>
              <option value="#2F4F4F">رمادي غامق</option>
            </select>
          </div>
        </div>
        
        <div class="slider-container">
          <span>حجم:</span>
          <input type="range" id="activeElementScale" min="0.1" max="5" step="0.05" value="1" oninput="updateActiveElementTransform()">
        </div>
        <div class="slider-container">
          <span>دوران:</span>
          <input type="range" id="activeElementRotation" min="-180" max="180" step="1" value="0" oninput="updateActiveElementTransform()">
        </div>

        <button class="delete-btn" onclick="deleteActiveElement()">🗑️ حذف العنصر المحدد</button>
      </div>

      <button class="action-btn download-btn" style="width: 100%; margin-top: 10px;" onclick="exportCustomImage()">
        ⬇️ حفظ التصميم المكتمل
      </button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="suggestModal">
  <div class="modal-content" id="suggestContent">
    <button class="close-modal" onclick="closeModal('suggestModal', 'suggestContent')">✖</button>
    <h3>لديك رسالة جميلة؟ ✨</h3>
    <textarea id="userQuote" class="custom-input" placeholder="اكتب رسالتك هنا..." rows="3"></textarea>
    <button id="submitQuoteBtn" class="submit-btn" onclick="sendQuoteToEmail()">إرسال الرسالة 🚀</button>
  </div>
</div>

<div class="modal-overlay" id="favViewModal">
  <div class="modal-content" id="favViewContent" style="padding: 15px;">
    <button class="close-modal" onclick="closeModal('favViewModal', 'favViewContent')">✖</button>
    <img id="favViewImage" src="" style="width: 100%; max-height: 50vh; object-fit: contain; border-radius: 15px; margin-bottom: 15px;">
    <div class="actions-row" style="margin-bottom: 10px;">
        <button class="action-btn share-btn" onclick="shareImage('favViewImage')">📤 مشاركة</button>
        <button class="action-btn download-btn" onclick="downloadImage('favViewImage')">⬇️ حفظ</button>
    </div>
    <button class="action-btn like-btn liked" onclick="removeFavoriteFromModal()" style="width: 100%;">❤️ إزالة من المفضلة</button>
  </div>
</div>

<script>
// ================= المتغيرات الأساسية =================
const images = ["images/1.jpg", "images/2.jpg", "images/3.jpg", "images/4.jpg", "images/5.jpg", "images/6.jpg", "images/7.jpg"]; 
const MAX_VIEWS = 3;
const API_KEY = "3863ddcd-c4bc-4099-9148-d4344f98bdd2"; 
let currentFavOpenIndex = null; // تخزين اندكس الصورة المفتوحة بالمفضلة

function showToast(message) {
  let container = document.getElementById("toast-container");
  if (!container) { 
    container = document.createElement("div"); 
    container.id = "toast-container"; 
    document.body.appendChild(container); 
  }
  const toast = document.createElement("div"); 
  toast.className = "toast"; 
  toast.innerText = message; 
  container.appendChild(toast);
  
  setTimeout(() => toast.classList.add("show"), 10);
  setTimeout(() => { 
    toast.classList.remove("show"); 
    setTimeout(() => toast.remove(), 400); 
  }, 3000);
}

// ================= نظام التشغيل والشعلة =================
function initApp() {
  const today = new Date().toDateString();
  let savedDate = localStorage.getItem("appDate");
  
  if (!localStorage.getItem("unseenQuotes")) {
    generateShuffledQuotes();
  }
  
  if (savedDate !== today) {
    localStorage.setItem("appDate", today);
    localStorage.setItem("viewCount", "1");
    localStorage.setItem("currentQuoteIndex", getNextQuoteIndex().toString());
    updateStreak(today);
  } else {
    displayStreak();
  }
}

function generateShuffledQuotes() {
  let all = Array.from({length: images.length}, (_, i) => i);
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  localStorage.setItem("unseenQuotes", JSON.stringify(all));
}

function getNextQuoteIndex() {
  let unseen = JSON.parse(localStorage.getItem("unseenQuotes")) || [];
  if (unseen.length === 0) {
    generateShuffledQuotes();
    unseen = JSON.parse(localStorage.getItem("unseenQuotes"));
  }
  let nextIndex = unseen.pop();
  localStorage.setItem("unseenQuotes", JSON.stringify(unseen));
  return nextIndex;
}

function updateStreak(todayStr) {
  let lastVisit = localStorage.getItem("lastVisitDate");
  let streak = parseInt(localStorage.getItem("streakCount") || "0");
  
  if (lastVisit) {
    let yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    if (lastVisit === yesterday.toDateString()) {
      streak++; 
    } else if (lastVisit !== todayStr) {
      streak = 1; 
    }
  } else {
    streak = 1; 
  }
  
  localStorage.setItem("lastVisitDate", todayStr);
  localStorage.setItem("streakCount", streak.toString());
  displayStreak();
}

function displayStreak() {
  let streak = parseInt(localStorage.getItem("streakCount") || "0");
  const badge = document.getElementById("streakBadge");
  if (streak > 0) {
    badge.style.display = "flex";
    document.getElementById("streakCount").innerText = streak;
  }
}

function showSplashScreen() {
  const overlay = document.getElementById("overlay");
  const splash = document.getElementById("splashScreen");
  
  overlay.style.opacity = "0";
  setTimeout(() => {
    overlay.style.display = "none";
    splash.style.display = "flex";
    initApp(); 
    setTimeout(() => splash.style.opacity = "1", 50);
  }, 500);
  
  setTimeout(() => {
    splash.style.opacity = "0";
    setTimeout(() => {
      splash.style.display = "none";
      document.getElementById("mainApp").style.display = "flex";
      updateQuoteUI(); 
      loadFavorites(); 
    }, 500);
  }, 2000);
}

// ================= رسالة اليوم والتفاعل =================
function loadNextQuote() {
  let count = parseInt(localStorage.getItem("viewCount") || "1");
  if (count < MAX_VIEWS) {
    count++;
    localStorage.setItem("viewCount", count.toString());
    localStorage.setItem("currentQuoteIndex", getNextQuoteIndex().toString());
    document.getElementById("quoteImage").style.opacity = "0";
    setTimeout(updateQuoteUI, 400); 
  }
}

function updateQuoteUI() {
  let count = parseInt(localStorage.getItem("viewCount") || "1");
  let indexStr = localStorage.getItem("currentQuoteIndex");
  let index = indexStr ? parseInt(indexStr) : 0;
  
  if (index >= images.length) index = 0; 
  let src = images[index];
  
  const img = document.getElementById("quoteImage");
  const bg = document.getElementById("bg");
  
  img.src = src;
  bg.style.backgroundImage = `url('${src}')`;
  
  updateLikeDisplay();

  const nextBtn = document.getElementById("nextBtn");
  const timerDiv = document.getElementById("timer");
  const remViewsSpan = document.getElementById("remViews");
  
  if (count >= MAX_VIEWS) {
    nextBtn.style.display = "none";
    timerDiv.style.display = "block";
    startTimer();
  } else {
    nextBtn.style.display = "block";
    timerDiv.style.display = "none";
    remViewsSpan.innerText = MAX_VIEWS - count;
  }
}

function startTimer() {
  function update() {
    const now = new Date();
    const tomorrow = new Date();
    tomorrow.setHours(24, 0, 0, 0);
    const diff = tomorrow - now;
    const h = Math.floor(diff / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);
    document.getElementById("timer").innerText = "⏳ رسائل جديدة بعد: " + h + "س " + m + "د " + s + "ث";
  }
  setInterval(update, 1000);
  update();
}

function switchTab(tabId, btnId) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active-tab');
  document.getElementById(btnId).classList.add('active');
  if (tabId === 'favTab') loadFavorites();
}

// ================= أزرار التفاعل =================
function showModal(modalId, contentId) { 
  const modal = document.getElementById(modalId); 
  const content = document.getElementById(contentId); 
  modal.style.display = "flex"; 
  setTimeout(() => { content.classList.add("show-modal"); }, 50); 
}

function closeModal(modalId, contentId) { 
  const modal = document.getElementById(modalId); 
  const content = document.getElementById(contentId); 
  content.classList.remove("show-modal"); 
  setTimeout(() => { modal.style.display = "none"; }, 400); 
}

function downloadImage(imgId) { 
  const imgSrc = document.getElementById(imgId).src; 
  const link = document.createElement('a'); 
  link.href = imgSrc; 
  link.download = 'رسالة.jpg'; 
  document.body.appendChild(link); 
  link.click(); 
  document.body.removeChild(link); 
  showToast("بدأ تحميل الصورة 📥"); 
}

async function shareImage(imgId) {
  const img = document.getElementById(imgId);
  try {
    const response = await fetch(img.src);
    const blob = await response.blob();
    const file = new File([blob], 'رسالة.jpg', { type: blob.type });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ 
        title: 'رسالة اليوم', 
        text: 'حبيت أشاركك هالرسالة اللطيفة ✨', 
        files: [file] 
      });
    } else {
      await navigator.share({ 
        title: 'رسالة اليوم', 
        text: 'شوف موقع رسالة اليوم ✨', 
        url: window.location.href 
      });
    }
  } catch (err) {
    showToast("لا يدعم متصفحك هذه الميزة 😢");
  }
}

function toggleLike() { 
  let index = localStorage.getItem("currentQuoteIndex") || "0"; 
  let likedImages = JSON.parse(localStorage.getItem("likedImages")) || {}; 
  
  if (likedImages[index]) { 
    delete likedImages[index]; 
  } else { 
    likedImages[index] = true; 
    showToast("تم الحفظ في المفضلة ❤️"); 
  } 
  localStorage.setItem("likedImages", JSON.stringify(likedImages)); 
  updateLikeDisplay(); 
}

function updateLikeDisplay() { 
  let index = localStorage.getItem("currentQuoteIndex") || "0"; 
  let likedImages = JSON.parse(localStorage.getItem("likedImages")) || {}; 
  const likeBtn = document.getElementById("likeBtn"); 
  const likeIcon = document.getElementById("likeIcon"); 
  
  if (likedImages[index]) { 
    likeBtn.classList.add("liked"); 
    likeIcon.innerText = "❤️"; 
  } else { 
    likeBtn.classList.remove("liked"); 
    likeIcon.innerText = "🤍"; 
  } 
}

// ================= تحسينات معرض المفضلة =================
function loadFavorites() {
  const grid = document.getElementById("favoritesGrid");
  grid.innerHTML = "";
  let likedImages = JSON.parse(localStorage.getItem("likedImages")) || {}; 
  let keys = Object.keys(likedImages);
  
  if (keys.length === 0) {
    grid.innerHTML = "<div class='empty-state'>لا يوجد رسائل مفضلة حتى الآن 💔</div>";
    return;
  }
  
  keys.forEach(indexStr => {
    let img = document.createElement("img");
    img.src = images[parseInt(indexStr)];
    img.className = "fav-item";
    img.onclick = () => openFavoriteModal(indexStr);
    grid.appendChild(img);
  });
}

function openFavoriteModal(indexStr) {
  currentFavOpenIndex = indexStr;
  document.getElementById("favViewImage").src = images[parseInt(indexStr)];
  showModal('favViewModal', 'favViewContent');
}

function removeFavoriteFromModal() {
  if (currentFavOpenIndex !== null) {
    let likedImages = JSON.parse(localStorage.getItem("likedImages")) || {}; 
    delete likedImages[currentFavOpenIndex];
    localStorage.setItem("likedImages", JSON.stringify(likedImages));
    showToast("تمت الإزالة من المفضلة 🗑️");
    closeModal('favViewModal', 'favViewContent');
    loadFavorites();
    updateLikeDisplay();
  }
}

async function sendQuoteToEmail() { 
  const userText = document.getElementById("userQuote").value; 
  if (userText.trim() === "") return showToast("الرجاء كتابة الرسالة ✍️"); 
  
  const btn = document.getElementById("submitQuoteBtn"); 
  btn.innerText = "جاري الإرسال ⏳..."; 
  btn.disabled = true; 
  
  try { 
    const response = await fetch("https://api.web3forms.com/submit", { 
      method: "POST", 
      headers: { "Content-Type": "application/json" }, 
      body: JSON.stringify({ 
        access_key: API_KEY, 
        subject: "اقتراح رسالة جديدة", 
        message: userText 
      }) 
    }); 
    const result = await response.json(); 
    if (result.success) { 
      showToast("تم الإرسال بنجاح! شكراً ❤️"); 
      closeModal('suggestModal', 'suggestContent'); 
      document.getElementById("userQuote").value = ""; 
    } 
  } catch (error) { 
    showToast("تأكد من اتصالك 🌐"); 
  } 
  
  btn.innerText = "إرسال الرسالة 🚀"; 
  btn.disabled = false; 
}

// ================= نظام "سوي رسالتك" المطور الشامل =================
const captureArea = document.getElementById("captureArea");
let elementCounter = 0;
let activeElement = null;
let initialDistance = null;
let initialScale = 1;
let initialX, initialY;

// تغيير حجم مساحة العمل (Canvas Aspect Ratio)
function changeCanvasSize() {
  const ratio = document.getElementById("canvasSizeSelector").value;
  captureArea.style.aspectRatio = ratio;
}

// تغيير الخلفية
function changeBackground(event) {
  const file = event.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      document.getElementById("templateBg").src = e.target.result;
    }
    reader.readAsDataURL(file);
  }
}

// إضافة صورة كعنصر فوق الخلفية
function addOverlayImage(event) {
  const file = event.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      elementCounter++;
      const newImg = document.createElement("img");
      newImg.className = "draggable-item draggable-img";
      newImg.id = "dynElem_" + elementCounter;
      newImg.src = e.target.result;
      
      // تهيئة بيانات التحويل (موقع، حجم، دوران)
      newImg.dataset.scale = "1";
      newImg.dataset.rotation = "0";
      newImg.dataset.x = "0";
      newImg.dataset.y = "0";
      
      newImg.style.top = "50%";
      newImg.style.left = "50%";
      newImg.style.transform = `translate(-50%, -50%) scale(1) rotate(0deg)`;
      
      captureArea.appendChild(newImg);
      selectElement(newImg);
    }
    reader.readAsDataURL(file);
  }
}

// إضافة نص جديد
function addNewText() {
  elementCounter++;
  const newText = document.createElement("div");
  newText.className = "draggable-item draggable-text";
  newText.id = "dynElem_" + elementCounter;
  newText.innerText = "اكتب هنا...";
  
  newText.dataset.scale = "1";
  newText.dataset.rotation = "0";
  newText.dataset.x = "0";
  newText.dataset.y = "0";
  
  newText.style.top = "50%";
  newText.style.left = "50%";
  newText.style.transform = `translate(-50%, -50%) scale(1) rotate(0deg)`;
  
  captureArea.appendChild(newText);
  selectElement(newText);
}

// تحديد العنصر لفتح لوحة الأدوات الخاصة به
function selectElement(el) {
  if (activeElement) activeElement.classList.remove("selected");
  activeElement = el;
  activeElement.classList.add("selected");
  
  document.getElementById("toolsPanel").style.display = "flex";
  
  // تحديث شرائط التمرير لتطابق العنصر المحدد
  document.getElementById("activeElementScale").value = activeElement.dataset.scale || 1;
  document.getElementById("activeElementRotation").value = activeElement.dataset.rotation || 0;

  if (el.classList.contains("draggable-text")) {
    document.getElementById("textToolsRow").style.display = "flex";
    document.getElementById("activeTextInput").value = el.innerText;
  } else {
    document.getElementById("textToolsRow").style.display = "none";
  }
}

// إلغاء التحديد
captureArea.addEventListener('click', (e) => {
  if (e.target.id === 'templateBg' || e.target.id === 'captureArea') {
    if (activeElement) activeElement.classList.remove("selected");
    activeElement = null;
    document.getElementById("toolsPanel").style.display = "none";
  }
});

// تحديث النصوص والخطوط
function updateActiveElementText() {
  if (!activeElement || !activeElement.classList.contains("draggable-text")) return;
  activeElement.innerText = document.getElementById("activeTextInput").value;
  activeElement.style.fontFamily = document.getElementById("activeFont").value;
  activeElement.style.color = document.getElementById("activeColor").value;
}

// تحديث الحجم والدوران (Scale & Rotation)
function updateActiveElementTransform() {
    if (!activeElement) return;
    let scale = parseFloat(document.getElementById("activeElementScale").value);
    let rotation = parseFloat(document.getElementById("activeElementRotation").value);
    
    activeElement.dataset.scale = scale;
    activeElement.dataset.rotation = rotation;
    
    let cx = activeElement.dataset.x || 0;
    let cy = activeElement.dataset.y || 0;
    
    activeElement.style.transform = `translate(calc(-50% + ${cx}px), calc(-50% + ${cy}px)) scale(${scale}) rotate(${rotation}deg)`;
}

function deleteActiveElement() {
  if (activeElement) {
    activeElement.remove();
    activeElement = null;
    document.getElementById("toolsPanel").style.display = "none";
  }
}

// إدارة السحب والزوم لجميع العناصر
captureArea.addEventListener("touchstart", dragStart, {passive: false});
captureArea.addEventListener("touchend", dragEnd, false);
captureArea.addEventListener("touchmove", drag, {passive: false});
captureArea.addEventListener("mousedown", dragStart, false);
captureArea.addEventListener("mouseup", dragEnd, false);
captureArea.addEventListener("mousemove", drag, false);
captureArea.addEventListener("mouseleave", dragEnd, false);

function dragStart(e) { 
  if (e.target.classList.contains('draggable-item')) { 
    selectElement(e.target);
    if (e.touches && e.touches.length === 2) {
      initialDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      initialScale = parseFloat(activeElement.dataset.scale) || 1;
    } else {
      let xOffset = parseFloat(activeElement.dataset.x) || 0;
      let yOffset = parseFloat(activeElement.dataset.y) || 0;
      initialX = (e.type === "touchstart" ? e.touches[0].clientX : e.clientX) - xOffset; 
      initialY = (e.type === "touchstart" ? e.touches[0].clientY : e.clientY) - yOffset; 
    }
  } 
}

function dragEnd(e) { 
  initialDistance = null; 
}

function drag(e) {
  if (activeElement && (e.type.includes("mouse") ? e.buttons === 1 : true)) {
    e.preventDefault();
    let rot = activeElement.dataset.rotation || 0; 
    
    if (e.touches && e.touches.length === 2 && initialDistance) {
      let currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      let scale = initialScale * (currentDistance / initialDistance);
      
      activeElement.dataset.scale = scale;
      document.getElementById("activeElementScale").value = scale;
      
      let cx = activeElement.dataset.x || 0;
      let cy = activeElement.dataset.y || 0;
      activeElement.style.transform = `translate(calc(-50% + ${cx}px), calc(-50% + ${cy}px)) scale(${scale}) rotate(${rot}deg)`;
    } else if (!e.touches || e.touches.length === 1) {
      let currentX = (e.type === "touchmove" ? e.touches[0].clientX : e.clientX) - initialX; 
      let currentY = (e.type === "touchmove" ? e.touches[0].clientY : e.clientY) - initialY; 
      
      activeElement.dataset.x = currentX;
      activeElement.dataset.y = currentY;
      
      let scale = activeElement.dataset.scale || 1;
      activeElement.style.transform = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px)) scale(${scale}) rotate(${rot}deg)`;
    }
  }
}

// تحميل التصميم النهائي
function exportCustomImage() {
  const btn = document.querySelector('.creator-card .download-btn');
  const originalText = btn.innerHTML;
  btn.innerHTML = "جاري التجهيز ⏳..."; 
  btn.disabled = true;
  
  if(activeElement) activeElement.classList.remove("selected");

  html2canvas(captureArea, { scale: 3, useCORS: true }).then(canvas => {
    if(activeElement) activeElement.classList.add("selected");

    const link = document.createElement('a'); 
    link.download = 'رسالتي_الخاصة.jpg'; 
    link.href = canvas.toDataURL('image/jpeg', 0.9);
    link.click(); 
    
    showToast("تم حفظ تصميمك بنجاح! 🎉"); 
    btn.innerHTML = originalText; 
    btn.disabled = false;
  });
}
